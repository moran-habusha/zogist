services:
  - type: web
    name: zogist
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --ws-ping-interval 30 --ws-ping-timeout 10
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
    plan: free
    healthCheckPath: /
